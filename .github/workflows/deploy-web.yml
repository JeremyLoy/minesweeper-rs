name: Deploy web build to GitHub Pages

# Build the WebAssembly version with Trunk and publish it to GitHub Pages on
# every push to main (and on manual dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run, so a
# running deploy can finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Only GitHub's own actions/* are used; the Rust toolchain (preinstalled on
    # the runner) and Trunk are set up with plain shell steps to avoid relying
    # on third-party actions.
    env:
      TRUNK_VERSION: v0.21.14
    steps:
      - uses: actions/checkout@v4

      - name: Add wasm target
        # rustup + a stable toolchain are preinstalled on ubuntu-latest.
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-wasm-

      - name: Install Trunk
        # Drop the prebuilt binary onto PATH (~/.cargo/bin). Trunk downloads the
        # matching wasm-bindgen and wasm-opt itself at build time.
        run: |
          curl -fsSL "https://github.com/trunk-rs/trunk/releases/download/${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xzf - -C "$HOME/.cargo/bin"

      # GitHub Pages serves a project site under /<repo>/, so the asset URLs
      # must be prefixed with the repository name.
      - name: Build with Trunk
        run: trunk build --release --public-url "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
